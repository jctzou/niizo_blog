  <!-- Vanilla JS functionality -->
  <script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function () {
      // 預載 WebP 圖片機制
      const preloadImage = (url) => { const img = new Image(); img.src = url; };

      // 袋身事件監聽
      document.querySelectorAll('#customBody .swatch').forEach(el => {
        const c = Array.from(el.classList).find(cls => cls !== 'swatch' && cls !== 'selected');
        if (c) preloadImage("images/BAG030/body" + c + ".webp");

        el.addEventListener('click', function () {
          document.querySelectorAll('#customBody li').forEach(li => li.classList.remove('selected'));
          document.querySelector('#customBox #bagBody').src = "images/BAG030/body" + c + ".webp";
          this.classList.add('selected');
        });
      });

      // 揹帶事件監聽
      document.querySelectorAll('#customHandle .swatch').forEach(el => {
        const c = Array.from(el.classList).find(cls => cls !== 'swatch' && cls !== 'selected');
        if (c) preloadImage("images/BAG030/handle" + c + ".webp");

        el.addEventListener('click', function () {
          document.querySelectorAll('#customHandle li').forEach(li => li.classList.remove('selected'));
          document.querySelector('#customBox #bagHandle').src = "images/BAG030/handle" + c + ".webp";
          this.classList.add('selected');
        });
      });

      // 袋底事件監聽
      document.querySelectorAll('#customBottom .swatch').forEach(el => {
        const c = Array.from(el.classList).find(cls => cls !== 'swatch' && cls !== 'selected');
        if (c) preloadImage("images/BAG030/bottom" + c + ".webp");

        el.addEventListener('click', function () {
          document.querySelectorAll('#customBottom li').forEach(li => li.classList.remove('selected'));
          document.querySelector('#customBox #bagBottom').src = "images/BAG030/bottom" + c + ".webp";
          this.classList.add('selected');
        });
      });

      // 包邊事件監聽
      document.querySelectorAll('#customTop .swatch').forEach(el => {
        const c = Array.from(el.classList).find(cls => cls !== 'swatch' && cls !== 'selected');
        if (c) preloadImage("images/BAG030/top" + c + ".webp");

        el.addEventListener('click', function () {
          document.querySelectorAll('#customTop li').forEach(li => li.classList.remove('selected'));
          document.querySelector('#customBox #bagTop').src = "images/BAG030/top" + c + ".webp";
          this.classList.add('selected');
        });
      });
    });

    window.setCustomValue = function () {
      let customValue = "";
      customValue += "【皮標文字】" + (document.getElementById("leatherText")?.value || "無此備註") + "、";
      let body = document.querySelector("#customBody .selected");
      customValue += "【袋身布】" + (body ? body.getAttribute("title") : "") + "、";
      let handle = document.querySelector("#customHandle .selected");
      customValue += "【揹帶布】" + (handle ? handle.getAttribute("title") : "") + "、";
      let bottom = document.querySelector("#customBottom .selected");
      customValue += "【袋底布】" + (bottom ? bottom.getAttribute("title") : "") + "、";
      let topEle = document.querySelector("#customTop .selected");
      customValue += "【包邊與內裡上緣布】" + (topEle ? topEle.getAttribute("title") : "");

      document.getElementById("customValue").innerText = customValue;

      // 複製到剪貼簿
      navigator.clipboard.writeText(customValue).then(() => {
        const btn = document.getElementById('copyBtn');
        if (btn) {
          const originalText = btn.innerText;
          btn.innerText = '✅ 已複製！請前往購物車貼上';
          btn.classList.add('btn-success');
          btn.classList.remove('btn-primary');
          setTimeout(() => {
            btn.innerText = originalText;
            btn.classList.remove('btn-success');
            btn.classList.add('btn-primary');
          }, 3000);
        }
      }).catch(err => {
        console.error('複製失敗', err);
      });
    };
  </script>
